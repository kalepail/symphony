name: rust-ci

on:
  pull_request:
    paths:
      - "rust/**"
      - ".github/workflows/rust-ci.yml"
      - ".github/pull_request_template.md"
      - ".github/workflows/pr-description-lint.yml"
      - "scripts/**"
      - "SPEC.md"
  push:
    branches:
      - main
    paths:
      - "rust/**"
      - ".github/workflows/rust-ci.yml"
      - ".github/pull_request_template.md"
      - ".github/workflows/pr-description-lint.yml"
      - "scripts/**"
      - "SPEC.md"

jobs:
  rust-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Check formatting
        run: cargo fmt --check

      - name: Run clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Run tests
        run: cargo test

      - name: Validate workspace cleanup hook syntax
        run: sh -n scripts/workspace_before_remove.sh

      - name: Validate GitHub publish preflight hook syntax
        run: sh -n scripts/github_publish_preflight.sh
