name: pr-description-lint

on:
  pull_request:
    types: [opened, edited, reopened, synchronize, ready_for_review]

jobs:
  validate-pr-description:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate PR description format
        env:
          PR_BODY_JSON: ${{ toJson(github.event.pull_request.body) }}
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          body = json.loads(os.environ.get("PR_BODY_JSON", '""')) or ""
          Path("/tmp/pr_body.md").write_text(body, encoding="utf-8")
          PY
          python3 scripts/check_pr_body.py --file /tmp/pr_body.md
